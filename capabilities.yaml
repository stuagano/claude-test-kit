# Capabilities this kit itself promises — caps, dogfooding caps.
# Prove with:  PYTHONPATH=. .venv/bin/python -m caps verify
# Check state: PYTHONPATH=. .venv/bin/python -m caps status
capabilities:
  - id: tests-green
    description: the full ctk + caps test suite passes
    given: the kit's source and tests
    when: the pytest suite runs
    then: every test passes (exit 0)
    tier: cheap
    deps: ["caps/**", "ctk/**", "tests/**", "conftest.py", "pytest.ini"]
    check:
      shell: .venv/bin/python -m pytest -q -p no:cacheprovider

  - id: gate-blocks-unproven
    description: the Stop-hook gate blocks a never-proven capability
    given: a project with an unproven capability
    when: the gate decides at end of a turn
    then: it returns a block decision naming the capability
    tier: cheap
    deps: ["caps/gate.py", "caps/state.py", "caps/project.py"]
    check: tests/unit/test_caps_gate.py::test_never_proven_blocks
  - id: add-cannot-fake-a-pass
    description: caps add creates a never-proven capability with a failing stub
    given: a newly proposed capability
    when: caps add runs and you verify before implementing the check
    then: the capability is red (fail) until a real check is written
    tier: cheap
    deps:
    - caps/manifest_edit.py
    check: tests/integration/test_caps_add_cli.py::test_add_then_verify_is_red_then_green
  - id: gate-noop-without-manifest
    description: the Stop-hook wrapper does nothing (and never launches Python) when
      a project has no capabilities.yaml
    given: a directory with no capabilities.yaml
    when: the Stop-hook gate runs at end of a turn
    then: it exits 0 with no output and without starting Python
    tier: cheap
    deps:
    - bin/caps-stop-gate.sh
    check: tests/integration/test_caps_wrapper.py::test_short_circuits_without_manifest
  - id: claim-vs-reality-trips
    description: claim_vs_reality raises when success is claimed but reality disagrees
    given: a step that reports success but produced wrong/empty output
    when: claim_vs_reality reconciles the claim against an independent verifier
    then: it raises a SILENT FAILURE rather than passing
    tier: cheap
    deps:
    - ctk/verify.py
    check: tests/unit/test_ctk_unit.py::test_claim_vs_reality_flags_silent_failure
  - id: verify-flags-empty-output
    description: verify(Artifact) catches a file that exists but is empty / too small
    given: a tool that exits 0 and leaves an empty output file
    when: verify checks the real artifact's size/content
    then: it fails instead of trusting the exit code
    tier: cheap
    deps:
    - ctk/verify.py
    check: tests/unit/test_ctk_unit.py::test_verify_flags_empty_file
  - id: swallowed-exception-scan
    description: find_swallowed_exceptions detects except/pass and log-and-swallow blocks
    given: source containing a swallowed exception
    when: the AST scanner runs over the tree
    then: it reports the swallowed exception
    tier: cheap
    deps:
    - ctk/lint.py
    check: tests/unit/test_ctk_unit.py::test_lint_flags_swallowed
  - id: error-log-guard-fails-test
    description: the autouse guard fails any test whose code logged at ERROR/CRITICAL
    given: code that catches an exception but logs it at ERROR
    when: the test finishes without raising
    then: the fail_on_error_log fixture still fails the test
    tier: cheap
    deps:
    - conftest.py
    check: tests/unit/test_error_log_guard.py::test_guard_captures_error_logs
  - id: fingerprint-ignores-artifacts
    description: fingerprint excludes __pycache__/.pyc so capabilities don't go stale
      on import
    given: a dep glob that also matches build artifacts
    when: the fingerprint is computed
    then: recompiled .pyc files never change it; real source changes do
    tier: cheap
    deps:
    - caps/fingerprint.py
    check: tests/unit/test_caps_fingerprint.py::test_ignores_pycache_and_pyc
  - id: add-validates-before-write
    description: 'caps add never corrupts the manifest: bad appends leave it untouched'
    given: an append that would produce an invalid manifest
    when: caps add validates the candidate in memory first
    then: the on-disk manifest is unchanged and the command errors
    tier: cheap
    deps:
    - caps/manifest_edit.py
    check: tests/unit/test_caps_manifest_edit.py::test_non_block_style_rejected_and_file_unchanged
  - id: gate-self-clears
    description: the Stop-hook gate blocks at most once, then allows the turn to finish
    given: a turn that was just blocked by the gate
    when: the re-stop arrives with stop_hook_active true
    then: the gate allows it (no infinite block loop)
    tier: cheap
    deps:
    - caps/gate.py
    check: tests/unit/test_caps_gate.py::test_stop_hook_active_allows
  - id: live-expiry-doesnt-block
    description: time-expiry of a live capability is a note, not a block (upholds Phase
      1)
    given: a live capability whose freshness window has passed with no code change
    when: the gate decides at end of a turn
    then: it does not block; it surfaces a non-blocking note
    tier: cheap
    deps:
    - caps/state.py
    check: tests/unit/test_caps_gate.py::test_time_expired_does_not_block_but_notes
  - id: expect-collects-all-failures
    description: expect() runs every contract check and reports all failures at once
    given: output that violates several declared contracts
    when: expect(...).<checks>.verify() runs
    then: it surfaces all violations together, not just the first
    tier: cheap
    deps:
    - ctk/contracts.py
    check: tests/unit/test_ctk_unit.py::test_contract_collects_all_failures
  - id: claim-vs-reality-flags-false-alarm
    description: claim_vs_reality also catches a claimed failure that actually succeeded
    given: a step that reports failure though reality is correct
    when: claim_vs_reality reconciles claim against reality
    then: it flags the mismatch instead of trusting the claim
    tier: cheap
    deps:
    - ctk/verify.py
    check: tests/unit/test_ctk_unit.py::test_claim_vs_reality_flags_false_alarm
  - id: error-log-guard-opt-out
    description: a test can opt out of the error-log guard with the allow_error_logs
      marker
    given: a test that intentionally logs at ERROR
    when: it is marked allow_error_logs
    then: the guard permits it instead of failing the test
    tier: cheap
    deps:
    - conftest.py
    check: tests/unit/test_error_log_guard.py::test_opt_out_marker_allows_error_logs
  - id: manifest-rejects-bad-tier
    description: the manifest loader rejects an invalid tier value
    given: a capability declaring an unknown tier
    when: load_manifest parses it
    then: it raises ManifestError rather than silently accepting
    tier: cheap
    deps:
    - caps/manifest.py
    check: tests/unit/test_caps_manifest.py::test_bad_tier_raises
  - id: manifest-rejects-duplicate-ids
    description: the manifest loader rejects duplicate capability ids
    given: two capabilities sharing an id
    when: load_manifest parses the manifest
    then: it raises ManifestError
    tier: cheap
    deps:
    - caps/manifest.py
    check: tests/unit/test_caps_manifest.py::test_duplicate_ids_raise
  - id: ledger-round-trips
    description: the ledger writes and reads back proof state losslessly
    given: a ledger entry with result, timestamp, fingerprint, waiver
    when: it is saved and loaded
    then: the loaded entry equals what was written
    tier: cheap
    deps:
    - caps/ledger.py
    check: tests/unit/test_caps_ledger.py::test_round_trip
  - id: runner-exit3-is-error
    description: the runner distinguishes 'could not run' (error) from a real failure
    given: a shell check that exits 3 (the reserved unreachable code)
    when: run_capability classifies the outcome
    then: it returns error, not fail
    tier: cheap
    deps:
    - caps/runner.py
    check: tests/unit/test_caps_runner.py::test_shell_error_convention_exit_3
  - id: verify-fails-nonzero
    description: caps verify exits non-zero when any capability check fails
    given: a capability whose check fails
    when: caps verify runs it
    then: the command exits non-zero and records the failure
    tier: cheap
    deps:
    - caps/cli.py
    check: tests/unit/test_caps_cli.py::test_verify_records_fail_and_exits_nonzero
  - id: gate-fails-open-on-bad-input
    description: the gate fails open (never bricks a turn) on malformed hook input
    given: a Stop-hook payload that is not valid JSON
    when: caps gate processes it
    then: it exits 0 with a visible additionalContext note instead of erroring
    tier: cheap
    deps:
    - caps/gate.py
    check: tests/unit/test_caps_cli.py::test_gate_malformed_input_fails_open
  - id: install-hook-idempotent
    description: install-hook can be run repeatedly without duplicating the hook entry
    given: settings.json that already has the caps Stop hook
    when: install-hook runs again
    then: exactly one caps hook entry remains
    tier: cheap
    deps:
    - caps/hookinstall.py
    check: tests/unit/test_caps_hookinstall.py::test_install_is_idempotent
  - id: init-produces-working-project
    description: caps init vendors a clean, self-contained project that status runs
      against
    given: an empty target directory
    when: caps init runs and then caps status runs in the vendored project
    then: the framework dirs are present (no __pycache__) and status exits 0
    tier: cheap
    deps:
    - caps/initializer.py
    - caps/cli.py
    check: tests/integration/test_caps_init_cli.py::test_init_then_status_runs_clean
  - id: status-json-is-machine-readable
    description: caps status --json emits structured state for the harness to consume
    given: a project with a failed capability
    when: status --json runs
    then: it reports the failing id in blocking[], ok=false, and the failure detail
    tier: cheap
    deps:
    - caps/cli.py
    check: tests/unit/test_caps_cli.py::test_status_json_is_machine_readable
  - id: doctor-flags-broken-setup
    description: caps doctor fails when a check file is missing so silent setup gaps
      surface
    given: a manifest whose check file does not exist
    when: caps doctor runs
    then: it reports the missing check and exits non-zero
    tier: cheap
    deps:
    - caps/doctor.py
    - caps/cli.py
    check: tests/unit/test_caps_doctor.py::test_missing_check_file_is_a_failure
  - id: verify-records-timing
    description: verify records each check's wall-clock duration in the ledger
    given: a capability whose check runs
    when: caps verify executes it
    then: the ledger entry carries a duration so slow/flaky checks are visible
    tier: cheap
    deps:
    - caps/cli.py
    - caps/runner.py
    - caps/ledger.py
    check: tests/unit/test_caps_cli.py::test_verify_records_duration
